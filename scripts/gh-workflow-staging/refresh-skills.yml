name: refresh-skills

# Weekly Sunday 03:00 UTC. Runs refresh-skills.sh, commits refresh-report.md
# changes if any, and opens a PR for review. Never auto-merges.

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run refresh-skills.sh
        id: refresh
        run: |
          chmod +x ./scripts/refresh-skills.sh
          # Don't fail the job on non-zero exit (stale skills → exit 1 is expected)
          ./scripts/refresh-skills.sh || true
          if [ -f refresh-report.md ]; then
            echo "report_exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- refresh-report.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: refresh/weekly-report-${{ github.run_id }}
          commit-message: "refresh: weekly skill staleness report"
          title: "refresh: weekly skill staleness report"
          body: |
            Auto-generated by `.github/workflows/refresh-skills.yml`.

            Review `refresh-report.md` for stale skills (>60d) and drifted upstream refs.
            Next step: run `./scripts/refresh-skills-auto.sh` locally to generate per-skill
            subagent briefs, then open individual refresh PRs.

            Do NOT auto-merge.
          labels: refresh, automated
          add-paths: refresh-report.md
